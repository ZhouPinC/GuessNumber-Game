<script>// 连接 WebSocket
let socket = new WebSocket('ws://' + window.location.host + '/gameSync');

// 发送游戏数据（模拟）
function sendGameData() {
    const data = {
        clientId: 'web_' + Math.random().toString(36).substr(2, 9),
        clientType: 'web',
        userCount: Math.floor(Math.random() * 100),
        score: Math.floor(Math.random() * 1000),
        level: Math.floor(Math.random() * 10) + 1
    };
    socket.send(JSON.stringify(data));
}

// 接收实时数据
socket.onmessage = function(event) {
    const data = JSON.parse(event.data);
    document.getElementById('userCount').textContent = data.userCount;
    document.getElementById('score').textContent = data.score;
    document.getElementById('level').textContent = data.level;
};


// 跳转到后台管理（需要登录）
document.getElementById('toAdmin').addEventListener('click', function() {
    window.location.href = '/admin';
});

// 游戏状态枚举
const GameState = {
    NOT_STARTED: 'not_started',
    RUNNING: 'running',
    PAUSED: 'paused',
    ENDED: 'ended'
};

// 游戏模式枚举
const GameMode = {
    GUESS: 'guess',
    CHALLENGE: 'challenge'
};

// 游戏配置
const settings = {
    minValue: 0,
    maxValue: 100,
    mode: GameMode.GUESS,
    maxAttempts: 10,
    fontSize: 16,
    fontColor: '#333333',
    difficulty: '简单' // 新增难度属性
};


// 难度等级枚举（新增挑战模式专属评价）
const Difficulty = {
    // 普通模式（猜数字模式）难度
    EASY: '简单',
    NORMAL: '一般',
    HARD: '困难',
    HELL: '地狱',
    NIGHTMARE: '噩梦',
    // 挑战模式难度
    JUST_THIS: '就这', // 设定次数 > log2n（太简单）
    STRENGTH: '实力'  // 设定次数 < log2n（有挑战性）
};

// 计算区间的 log2n（折中查找最优次数，向上取整）
function calculateLog2n(min, max) {
    const range = max - min + 1; // 包含两端，如0-100是101个数
    return Math.ceil(Math.log2(range)); // 向上取整，确保最优次数覆盖所有情况
}


// 统一难度计算函数（区分普通/挑战模式）
function calculateDifficulty(mode, min, max, maxAttempts) {
    const log2n = calculateLog2n(min, max);

    // 普通模式（猜数字模式）：按 log2n 分难度
    if (mode === GameMode.GUESS) {
        if (log2n <= 5) return Difficulty.EASY;
        if (log2n <= 10) return Difficulty.NORMAL;
        if (log2n <= 15) return Difficulty.HARD;
        if (log2n <= 20) return Difficulty.HELL;
        return Difficulty.NIGHTMARE;
    }

    // 挑战模式：按设定次数与 log2n 比较分难度
    if (mode === GameMode.CHALLENGE) {
        if (maxAttempts > log2n) return Difficulty.JUST_THIS; // 设定次数多，太简单
        if (maxAttempts < log2n) return Difficulty.STRENGTH; // 设定次数少，有难度
        return Difficulty.NORMAL; // 相等时算一般
    }

    return Difficulty.EASY;
}

    loadSettings();

// 开始新游戏
function startGame() {
    targetNumber = Math.floor(Math.random() * (settings.maxValue - settings.minValue + 1)) + settings.minValue;
    attempts = 0;
    currentHistory = [];
    gameState = GameState.RUNNING;

    modals.pause.style.display = 'none';
    modals.result.style.display = 'none';

    displays.guessHistory.innerHTML = '';
    inputs.guess.value = '';
    inputs.guess.focus();

    showGamePanel();
    updateStatus();
}

// 提交猜测
function submitGuess() {
    if (gameState !== GameState.RUNNING) return;

    const guessStr = inputs.guess.value.trim();
    if (!guessStr) return;

    const guess = parseInt(guessStr, 10);

    // 验证输入
    if (isNaN(guess) || guess < settings.minValue || guess > settings.maxValue) {
        alert(`请输入${settings.minValue}到${settings.maxValue}之间的整数`);
        return;
    }

    attempts++;

    // 记录猜测
    let result;
    if (guess === targetNumber) {
        result = 'correct';
        gameState = GameState.ENDED;
        saveGameResult(true);
        showResultModal(true);
    } else if (guess < targetNumber) {
        result = 'low';
    } else {
        result = 'high';
    }

    // 先添加历史记录，再检查是否失败
    const historyItem = {
        guess,
        result,
        time: new Date().toLocaleTimeString()
    };
    currentHistory.push(historyItem);
    addHistoryItem(historyItem);

    // 检查挑战模式是否失败（移到记录历史之后）
    if (settings.mode === GameMode.CHALLENGE && attempts >= settings.maxAttempts && result !== 'correct') {
        result = 'failed';
        gameState = GameState.ENDED;
    }

    // 保存游戏结果
    if (gameState === GameState.ENDED) {
        saveGameResult(result === 'correct');
        showResultModal(result === 'correct');
    }


    // 清空输入框
    inputs.guess.value = '';
    inputs.guess.focus();

    // 更新状态
    updateStatus();
}

// 放弃游戏
function giveUp() {
    if (gameState !== GameState.RUNNING) return;

    gameState = GameState.ENDED;
    saveGameResult(false, true);
    showResultModal(false, true);
}

// 暂停游戏
function pauseGame() {
    if (gameState !== GameState.RUNNING) return;

    gameState = GameState.PAUSED;
    displays.pauseInfo.textContent = `当前模式：${settings.mode === GameMode.GUESS ? '猜数字模式' : '挑战模式'}`;
    displays.pauseStats.textContent = `已猜次数：${attempts}`;
    modals.pause.style.display = 'flex';
}

// 恢复游戏
function resumeGame() {
    gameState = GameState.RUNNING;
    modals.pause.style.display = 'none';
    inputs.guess.focus();
}

// 返回开始界面
function backToStart() {
    if (gameState === GameState.RUNNING) {
        if (!confirm('当前游戏正在进行中，确定要返回首页吗？')) {
            return;
        }
    }

    gameState = GameState.NOT_STARTED;
    modals.pause.style.display = 'none';
    modals.result.style.display = 'none';
    showStartPanel();
}

// 修改得分计算函数，根据难度调整
function calculateScore(success, attempts) {
    if (!success) return 0;

    // 根据不同难度计算分数
    switch(settings.difficulty) {
        case '简单':
            // 简单：基础分100分，每多一次尝试减3分，最低10分
            return Math.max(100 - (attempts * 3), 10);
        case '一般':
            // 一般：基础分200分，每多一次尝试减5分，最低20分
            return Math.max(200 - (attempts * 5), 20);
        case '困难':
            // 困难：基础分300分，每多一次尝试减7分，最低30分
            return Math.max(300 - (attempts * 7), 30);
        case '地狱':
            // 地狱：基础分500分，每多一次尝试减10分，最低50分
            return Math.max(500 - (attempts * 10), 50);
        case '噩梦':
            // 噩梦：基础分1000分，每多一次尝试减15分，最低100分
            return Math.max(1000 - (attempts * 15), 100);
        default:
            return Math.max(100 - (attempts * 5), 10);
    }
}

// 显示结果弹窗
function showResultModal(success, gaveUp = false) {
    const score = calculateScore(success, attempts);

    if (success) {
        displays.resultTitle.textContent = '恭喜你！';
        displays.resultMessage.textContent = `你猜对了！答案就是 ${targetNumber}，共用了 ${attempts} 次尝试。得分：${score}`;
    } else if (gaveUp) {
        displays.resultTitle.textContent = '游戏结束';
        displays.resultMessage.textContent = `你放弃了游戏。正确答案是 ${targetNumber}。得分：${score}`;
    } else {
        displays.resultTitle.textContent = '挑战失败';
        displays.resultMessage.textContent = `很遗憾，你没有猜对。正确答案是 ${targetNumber}。得分：${score}`;
    }

    modals.result.style.display = 'flex';
}

// 添加历史记录项
function addHistoryItem(item) {
    const div = document.createElement('div');
    div.className = `history-item ${item.result}`;

    let resultText;
    switch (item.result) {
        case 'correct':
            resultText = '正确！';
            break;
        case 'low':
            resultText = '偏小';
            break;
        case 'high':
            resultText = '偏大';
            break;
        case 'failed':
            resultText = '失败';
            break;
    }

    div.innerHTML = `
      <strong>${item.time}</strong> - 你猜的是 ${item.guess}，${resultText}
      ${settings.mode === GameMode.CHALLENGE ? `<br>已猜 ${attempts}/${settings.maxAttempts} 次` : ''}
  `;

    displays.guessHistory.appendChild(div);
    displays.guessHistory.scrollTop = displays.guessHistory.scrollHeight;
}

// 更新游戏信息显示
function updateGameInfo() {
    const modeText = settings.mode === GameMode.GUESS ? '猜数字模式' : '挑战模式';
    let difficultyText = '';

    // 仅在猜数字模式下显示难度
    if (settings.mode === GameMode.GUESS) {
        difficultyText = `，难度：${settings.difficulty}`;
    }

    displays.gameModeInfo.textContent = `当前模式：${modeText}${difficultyText}`;
    displays.rangeInfo.textContent = `区间：${settings.minValue} ～ ${settings.maxValue}${
        settings.mode === GameMode.CHALLENGE ? `（剩余 ${settings.maxAttempts} 次）` : ''
    }`;
}

// 更新状态信息
function updateStatus() {
    if (gameState === GameState.RUNNING) {
        displays.statusInfo.textContent = `状态：已猜 ${attempts} 次${
            settings.mode === GameMode.CHALLENGE ? `，剩余 ${settings.maxAttempts - attempts} 次` : ''
        }`;
    } else if (gameState === GameState.PAUSED) {
        displays.statusInfo.textContent = '状态：游戏已暂停';
    } else if (gameState === GameState.ENDED) {
        displays.statusInfo.textContent = '状态：游戏已结束';
    }
}

// 更新历史记录显示
function updateHistoryDisplay() {
    if (gameHistory.length === 0) {
        displays.allHistory.innerHTML = '<p class="empty-history">暂无历史记录</p>';
        return;
    }

    displays.allHistory.innerHTML = '';

    gameHistory.forEach((record, index) => {
        const div = document.createElement('div');
        div.className = 'game-record';

        div.innerHTML = `
          <p><strong>游戏 ${index + 1}：${record.date}</strong></p>
          <p>模式：${record.mode}，区间：${record.range}</p>
          <p>答案：${record.target}，尝试次数：${record.attempts}</p>
          <p>结果：${record.success ? '成功' : record.gaveUp ? '放弃' : '失败'}</p>
      `;

        displays.allHistory.appendChild(div);
    });
}

// 保存设置处理函数
function saveSettingsHandler() {
    const min = parseInt(inputs.minValue.value, 10);
    const max = parseInt(inputs.maxValue.value, 10);
    const attempts = parseInt(inputs.maxAttempts.value, 10);
    const fontSize = parseInt(inputs.fontSize.value, 10);
    const fontColor = inputs.fontColor.value;
    const mode = document.querySelector('input[name="game-mode"]:checked').value;

    // 验证区间设置
    if (isNaN(min) || isNaN(max) || min >= max || max - min < 10) {
        alert('请输入有效的数值区间，要求最大值大于最小值且区间长度至少为10');
        return;
    }

    // 验证尝试次数
    if (mode === GameMode.CHALLENGE && (isNaN(attempts) || attempts < 1)) {
        alert('请输入有效的限定次数，至少为1');
        return;
    }

    // 验证字体大小
    if (isNaN(fontSize) || fontSize < 12 || fontSize > 24) {
        alert('请输入有效的字体大小，范围12-24');
        return;
    }


    // 计算当前模式的难度评价（核心修改）
    const difficulty = calculateDifficulty(mode, min, max, attempts);


    // 保存设置
    settings.minValue = min;
    settings.maxValue = max;
    settings.mode = mode;
    settings.maxAttempts = attempts;
    settings.fontSize = fontSize;
    settings.fontColor = fontColor;
    settings.difficulty = difficulty; // 保存难度设置

    saveSettings();
    applyVisualSettings();

    modals.settings.style.display = 'none';
    alert(`设置已保存，难度级别：${difficulty}`);
}

// 初始化游戏
document.addEventListener('DOMContentLoaded', init);
</script>
